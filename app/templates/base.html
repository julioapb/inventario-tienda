<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    {% if session.get('usuario') %}
    <!-- Sidebar lateral -->
    <div class="d-flex">
        <div class="bg-dark text-white" style="width: 200px; height: 100vh; position: fixed; top: 0; left: 0; overflow-y: auto;">
            <div class="p-3">
                <a href="/caja" class="d-block mb-4">
                    <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo" style="height: 60px;">
                </a>
                <ul class="nav flex-column">
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/caja">Caja</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/productos">Productos</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/inventario">Inventario</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/inventario/movimientos">Movimientos</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/cierres">Historial cierres</a>
                    </li>
                    <li class="nav-item mb-2">
                        <a class="nav-link text-white" href="/cierre">Cierre</a>
                    </li>
                </ul>
                <hr class="text-white">
                <div class="text-center">
                    <span class="d-block mb-2">{{ session['usuario'] }}</span>
                    <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
                </div>
            </div>
        </div>
        <!-- Contenido principal -->
        <div class="flex-fill" style="margin-left: 200px;">
    {% endif %}

    {% block content %}{% endblock %}

    {% if session.get('usuario') %}
        </div>
    </div>
    {% endif %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
