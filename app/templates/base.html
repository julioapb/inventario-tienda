<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Sistema{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
    {% if session.get('usuario') %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/caja">
                <img src="{{ url_for('static', filename='img/logo.jpeg') }}" alt="Logo" style="height: 40px;">
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="menu">

                <ul class="navbar-nav me-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/caja">Caja</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/productos">Productos</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/inventario">Inventario</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/inventario/movimientos">Movimientos</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cierres">Historial cierres</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/cierre">Cierre</a>
                    </li>
                </ul>
                <span class="navbar-text me-3">
                    {{ session['usuario'] }}
                </span>
                <a href="/logout" class="btn btn-danger btn-sm">Salir</a>
            </div>
        </div>
    </nav>
    {% endif %}

    {% block content %}{% endblock %}
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
